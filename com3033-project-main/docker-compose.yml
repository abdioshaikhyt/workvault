services:
  backend1_app:
    build:
     context: ./backend1
     dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 backend1.asgi:application
    volumes:
      - ./backend1/:/code/backend1
      - backend1celerybeat:/celery
    ports:
      - 8000:8000
    networks:
      - appbackend1-network
      - app-network
      - rabbitnetwork
    env_file:
      - .env
    depends_on:
      - postgresql_db1
      - redis
      - rabbitmq

  consumer1:
    build:
     context: ./backend1
     dockerfile: Dockerfile
    command: ["/start.sh"]
    networks:
      - appbackend1-network
      - app-network
      - rabbitnetwork
    env_file:
      - .env
    depends_on:
      - postgresql_db1
      - redis
      - rabbitmq    

  celery1:
    build:
     context: ./backend1
     dockerfile: Dockerfile
    command: ["/start_celery.sh"] 
    user: celery   
    volumes:
      - ./backend1/:/code/backend1
      - backend1celerybeat:/celery
    networks:
      - appbackend1-network
      - app-network  
      - rabbitnetwork
    env_file:
      - .env
    depends_on:
      - postgresql_db1
      - redis
      - rabbitmq   

  postgresql_db1:
    image: postgres:16.10
    volumes:
      - ~/volumes/proj/dip/postgres_db1/:/var/lib/postgresql/data/
    ports:
      - 5432:5432
    networks:
      - appbackend1-network
      - rabbitnetwork
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DATABASE1_USER}
      - POSTGRES_PASSWORD=${DATABASE1_PASSWORD}
      - POSTGRES_DB=${DATABASE1_NAME}

  redis:
    image: redis:6.2
    container_name: redis
    ports:
      - 6379:6379
    networks:
      - app-network

  nginx:
    container_name: nginx_web
    restart: on-failure
    image: nginx:latest
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/var/www/frontend
    ports:
      - "80:80"
    networks:
      - appbackend1-network
      - appbackend2-network
      - appbackend3-network
      - appbackend4-network
      - appbackendauth-network
      - app-network
    depends_on:
      - backend1_app
      - backend2_app
      - backend3_app
      - backend4_app
      - backendauth_app
      - frontend
      
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: es01
    env_file:
      - .env
    environment:
      - cluster.name=docker-cluster
      - node.name=es01
      - discovery.type=single-node
 #     - discovery.seed_hosts=es01,es02,es03
 #     - cluster.initial_master_nodes=es01,es02,es03
      - AWS_REGION=eu-west-1
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    networks:
      - appbackend2-network
    ports:
      - 9200:9200   

