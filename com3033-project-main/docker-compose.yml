      - redis

  celery4:
    build:
     context: ./backend4
     dockerfile: Dockerfile
    command: ["/start_celery.sh"]   
    user: celery  
    volumes:
      - ./backend4/:/code/backend4
      - backend4celerybeat:/celery
    networks:
      - appbackend4-network
      - app-network
      - rabbitnetwork  
    env_file:
      - .env
    environment:
      - WDM_CACHEPATH=/home/celery/.wdm
    depends_on:
      - postgresql_db4
      - redis
      - rabbitmq   

  postgresql_db4:
    image: postgres:16.10
    volumes:
      - ~/volumes/proj/dip/postgres_db4/:/var/lib/postgresql/data/
    ports:
      - 5435:5432
    networks:
      - appbackend4-network
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DATABASE4_USER}
      - POSTGRES_PASSWORD=${DATABASE4_PASSWORD}
      - POSTGRES_DB=${DATABASE4_NAME}

  backendauth_app:
    build:
     context: ./backendauth
     dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 7999 backendauth.asgi:application
    volumes:
      - ./backendauth/:/code/backendauth
      - backendauthcelerybeat:/celery
    ports:
      - 7999:7999
    networks:
      - appbackendauth-network
      - app-network
      - rabbitnetwork
    env_file:
      - .env
    depends_on:
      - postgresql_dbauth
      - redis
      - rabbitmq

  celeryauth:
    build:
     context: ./backendauth
     dockerfile: Dockerfile
    command: ["/start_celery.sh"]  
    user: celery   
    volumes:
      - ./backendauth/:/code/backendauth
      - backendauthcelerybeat:/celery
    networks:
      - appbackendauth-network
      - app-network 
      - rabbitnetwork
    env_file:
      - .env
    depends_on:
      - postgresql_dbauth
      - redis    
      - rabbitmq   

  postgresql_dbauth:
    image: postgres:16.10
    volumes:
      - ~/volumes/proj/dip/postgres_dbauth/:/var/lib/postgresql/data/
    ports:
      - 5436:5432
    networks:
      - appbackendauth-network
      - rabbitnetwork
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DATABASEAUTH_USER}
      - POSTGRES_PASSWORD=${DATABASEAUTH_PASSWORD}
      - POSTGRES_DB=${DATABASEAUTH_NAME}
  
  rabbitmq:
    container_name: 'rabbitmq'
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rabbitnetwork
  
  frontend:
    build:
     context: ./frontend
     dockerfile: Dockerfile
    volumes: 
      - frontend_build:/code/frontend/dist
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run build && sleep infinity"
    networks:
      - app-network
    depends_on:
      - redis
      
networks:
  appbackend1-network:
  appbackend2-network:
  appbackend3-network:
  appbackend4-network:
  appbackendauth-network:
  app-network:
  esnet:
  rabbitnetwork:

volumes:
   esdata1:
   rabbitmq_data:
   esdata01:
   esdata02:
   esdata03:
   frontend_build:
   backend1celerybeat:
   backend2celerybeat:
   backend3celerybeat:
   backend4celerybeat:
   backendauthcelerybeat: