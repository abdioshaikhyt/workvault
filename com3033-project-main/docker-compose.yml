  consumer3:
    build:
     context: ./backend3
     dockerfile: Dockerfile
    command: ["/start.sh"]
    networks:
      - appbackend3-network
      - app-network
      - rabbitnetwork
    env_file:
      - .env
    depends_on:
      - postgresql_db3
      - redis
      - rabbitmq

  celery3:
    build:
     context: ./backend3
     dockerfile: Dockerfile
    command: ["/start_celery.sh"]   
    user: celery  
    volumes:
      - ./backend3/:/code/backend3
      - backend3celerybeat:/celery
    networks:
      - appbackend3-network
      - app-network  
      - rabbitnetwork
    env_file:
      - .env
    depends_on:
      - postgresql_db3
      - redis
      - rabbitmq   

  postgresql_db3:
    image: postgres:16.10
    volumes:
      - ~/volumes/proj/dip/postgres_db3/:/var/lib/postgresql/data/
    ports:
      - 5434:5432
    networks:
      - appbackend3-network
      - rabbitnetwork
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DATABASE3_USER}
      - POSTGRES_PASSWORD=${DATABASE3_PASSWORD}
      - POSTGRES_DB=${DATABASE3_NAME}

  backend4_app:
    build:
     context: ./backend4
     dockerfile: Dockerfile
    command: uvicorn backend4.asgi:application --host 0.0.0.0 --port 8003
    volumes:
      - ./backend4/:/code/backend4
      - backend4celerybeat:/celery
