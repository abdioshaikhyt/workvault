  backend2_app:
    build:
     context: ./backend2
     dockerfile: Dockerfile
    command: uvicorn backend2.asgi:application --host 0.0.0.0 --port 8001
    volumes:
      - ./backend2/:/code/backend2
      - backend2celerybeat:/celery
    ports:
      - 8001:8001
    networks:
      - appbackend2-network
      - app-network
      - rabbitnetwork
    env_file:
      - .env
